name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Lets other workflows (e.g. the scheduled rules updater) trigger a rebuild.
  workflow_call:
    inputs:
      ref:
        description: Git ref or SHA to build and deploy
        required: false
        type: string
        default: ""

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_call we build the ref passed in (the just-pushed data
          # commit); for push/dispatch this is empty and checkout uses the event SHA.
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      # The site is served from the root of the custom domain (fedramp.neal.codes),
      # so no basePath is needed — leave NEXT_PUBLIC_BASE_PATH unset (empty).
      - name: Build static site
        run: npm run build

      # GitHub Pages ignores files/dirs beginning with "_" (e.g. _next) unless
      # a .nojekyll file is present at the root.
      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
